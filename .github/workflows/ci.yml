name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    name: Lint + Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16   # NOT postgres:16 — the suite needs the vector extension
        env:
          POSTGRES_USER: aqa
          POSTGRES_PASSWORD: aqa
          POSTGRES_DB: aqa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aqa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable + dev extras)
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        # conftest creates/drops its own aqa_test DB against the service;
        # 2 tests skip without MinIO/embeddings. Config defaults match the service.
        run: pytest -q

  migration-drift:
    name: Migration drift
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aqa
          POSTGRES_PASSWORD: aqa
          POSTGRES_DB: aqa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aqa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable + dev extras)
        run: pip install -e ".[dev]"

      - name: Apply migrations
        # the initial migration self-bootstraps the pgvector extension
        run: alembic upgrade head

      - name: Check models match migrations
        # fails if a model change has no corresponding migration (autogenerate drift)
        run: alembic check
