services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aqa
      POSTGRES_PASSWORD: aqa
      POSTGRES_DB: aqa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aqa"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aqa:aqa@postgres:5432/aqa
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  pgdata:
  miniodata:
